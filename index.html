<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video desde Google Drive</title>
</head>
<body>
    <h1>Video desde Google Drive</h1>
    <iframe id="videoFrame" src="https://drive.google.com/file/d/1wrdcr2a4tfbeVNkT2rgL-mO1NKOmJN-b/preview" width="640" height="480" allow="autoplay"></iframe>

    <script>
        const iframe = document.getElementById('videoFrame');
        iframe.addEventListener('load', () => {
            const video = iframe.contentWindow.document.querySelector('video');
            if (video) {
                setInterval(() => {
                    video.pause();
                }, 5000);
            }
        });
    </script>
</body>
</html>
